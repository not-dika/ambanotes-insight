name: Daily YouTube Data Fetch

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          MONGO_DB: bigdata
          MONGO_COLLECTION: youtube_events
          CSV_OUTPUT: youtube_events.csv
        run: python youtube_scraper.py --limit 10

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-data
          path: youtube_events.csv
